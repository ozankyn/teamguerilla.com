<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş — TG Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0B0C10;
    --surface: #151820;
    --border: rgba(255,255,255,0.08);
    --text: #E8E8EC;
    --text-muted: #8B8D98;
    --accent: #E63946;
    --accent-hover: #FF4D5A;
    --radius: 12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-card {
    width: 100%;
    max-width: 400px;
    padding: 48px 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    margin: 20px;
  }

  .logo { text-align: center; margin-bottom: 40px; }
  .logo h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .logo h1 span { color: var(--accent); }
  .logo p { font-size: 13px; color: var(--text-muted); margin-top: 6px; }

  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .form-group input {
    width: 100%;
    padding: 12px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 15px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .form-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(230,57,70,0.15);
  }

  .btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 8px;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .error {
    background: rgba(230,57,70,0.1);
    border: 1px solid rgba(230,57,70,0.2);
    color: var(--accent);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .error.show { display: block; }
</style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <h1>Team <span>Guerilla</span></h1>
      <p>Admin Panel</p>
    </div>
    <div id="error" class="error"></div>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Kullanıcı Adı</label>
        <input type="text" id="username" name="username" required autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label for="password">Şifre</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn" id="submitBtn">Giriş Yap</button>
    </form>
  </div>

  <script>
    // Check if already logged in
    const token = localStorage.getItem('tg_token');
    if (token) window.location.href = '/admin';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errEl = document.getElementById('error');
      btn.disabled = true;
      btn.textContent = 'Giriş yapılıyor...';
      errEl.classList.remove('show');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        localStorage.setItem('tg_token', data.token);
        localStorage.setItem('tg_user', JSON.stringify(data.user));
        window.location.href = '/admin';
      } catch (err) {
        errEl.textContent = err.message || 'Giriş başarısız';
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Giriş Yap';
      }
    });
  </script>
</body>
</html>
